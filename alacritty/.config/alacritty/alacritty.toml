[window.dimensions]
columns = 136
lines = 40

[window]
padding = { x = 6 }

[cursor.style]
shape = "Underline"
blinking = "Always"

[colors]

[colors.primary]
background = "#212121"
foreground = "#eeffff"

[colors.cursor]
text = "#bfbfbf"
cursor = "#ffffff"

[colors.selection]
background = "#eeffff"
foreground = "#545454"

[colors.normal]
black = "#000000"
red = "#ff5370"
green = "#c3e88d"
yellow = "#ffcb6b"
blue = "#82aaff"
magenta = "#c792ea"
cyan = "#89ddff"
white = "#ffffff"

[colors.bright]
black = "#545454"
red = "#ff5370"
green = "#c3e88d"
yellow = "#ffcb6b"
blue = "#82aaff"
magenta = "#c792ea"
cyan = "#89ddff"
white = "#ffffff"

[font]

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"